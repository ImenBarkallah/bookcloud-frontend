<section class="featured-section">
  <h2 class="featured-heading">
    <span>{{ 'FEATURED.TITLE' | translate }}</span>
  </h2>

  <p class="featured-empty" *ngIf="!loading && books.length === 0">
    Aucun livre mis en avant pour le moment.
  </p>

  <div class="featured-scroll">
    <div class="featured-track">
      <article class="book-card" *ngFor="let b of books">
        <div class="cover" [ngStyle]="coverStyle(b)"></div>
        <div class="card-body">
          <h3 class="book-title">{{ b.title }}</h3>
          <p class="book-meta">
            <span>{{ 'FEATURED.AUTHOR' | translate }}:</span>
            {{ b.author }}
          </p>
          <span class="cat-badge">{{ b.categoryName || b.categoryId }}</span>
          <div class="stars" aria-hidden="true">
            <span *ngFor="let i of starIndexes()" class="star" [class.filled]="i < ratingStars(b.averageRating)">★</span>
          </div>
          <span class="pill" [class.pill-ok]="available(b)" [class.pill-no]="!available(b)">
            {{ (available(b) ? 'FEATURED.AVAILABLE' : 'FEATURED.BORROWED') | translate }}
          </span>
        </div>
      </article>
    </div>
  </div>
</section>
