<section class="quick-search-strip">
  <div class="strip-inner">
    <div class="search-row">
      <div class="search-input-wrap">
        <svg class="search-ico" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input
          type="search"
          class="search-input-field"
          [placeholder]="'HOME.QUICK_SEARCH.PLACEHOLDER' | translate"
          [(ngModel)]="query"
          (input)="onQueryInput()"
          (focus)="onQueryInput()"
          (blur)="hideSuggestionsDelayed()"
          (focus)="onFocusInput()"
          autocomplete="off"
        />
        <div class="suggestions glass-dropdown" *ngIf="showSuggestions && suggestions.length">
          <button
            type="button"
            class="suggestion-item"
            *ngFor="let b of suggestions"
            (mousedown)="pickSuggestion(b); $event.preventDefault()"
          >
            <span class="thumb" aria-hidden="true"></span>
            <span class="meta">
              <span class="t">{{ b.title }}</span>
              <span class="a">{{ b.author }}</span>
            </span>
          </button>
        </div>
      </div>

      <div class="category-select-wrap">
        <select class="category-select" [(ngModel)]="categoryFilter">
          <option [ngValue]="null">{{ 'CATALOGUE.CATEGORY_ALL' | translate }}</option>
          <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
        </select>
      </div>

      <button
        type="button"
        class="search-btn"
        #searchBtn
        (click)="submitSearch()"
        (mouseenter)="onSearchBtnHover(searchBtn, true)"
        (mouseleave)="onSearchBtnHover(searchBtn, false)"
      >
        <span>{{ 'HOME.QUICK_SEARCH.BTN' | translate }}</span>
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
        </svg>
      </button>

      <span class="kbd-hint-pill">{{ 'HOME.QUICK_SEARCH.KBD_HINT' | translate }}</span>
    </div>

    <div class="trending-row">
      <span class="trend-label">{{ 'HOME.QUICK_SEARCH.TRENDING' | translate }}</span>
      <button
        type="button"
        class="trend-pill"
        *ngFor="let t of trending"
        (click)="applyTrend(t)"
        #pillEl
        (mouseenter)="onTrendHover(pillEl, true)"
        (mouseleave)="onTrendHover(pillEl, false)"
      >
        {{ t }}
      </button>
    </div>
  </div>
</section>
