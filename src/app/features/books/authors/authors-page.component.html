<section class="pub-page">
  <header class="pub-head">
    <h1>{{ 'PUBLIC.AUTHORS_TITLE' | translate }}</h1>
    <p class="lead">{{ 'PUBLIC.AUTHORS_LEAD' | translate }}</p>
  </header>

  <div class="loading" *ngIf="loading">{{ 'PUBLIC.LOADING' | translate }}</div>
  <p class="err" *ngIf="error">{{ 'PUBLIC.LOAD_ERROR' | translate }}</p>

  <div class="grid" *ngIf="!loading && !error">
    <article class="card glass" *ngFor="let a of authors">
      <h2>{{ a.name }}</h2>
      <p class="meta" *ngIf="a.country">{{ a.country }}</p>
      <p class="bio" *ngIf="a.bio">{{ a.bio }}</p>
      <a class="cta" [routerLink]="['/catalogue']" [queryParams]="{ search: a.name }">{{
        'PUBLIC.SEE_BOOKS_AUTHOR' | translate
      }}</a>
    </article>
  </div>
</section>
